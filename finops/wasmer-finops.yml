tags:
- WebAssembly
- Wasm
- Registry
- Edge
- Runtime
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Wasmer spend. Wasmer bills a flat Pro subscription plus
  usage-based overages on Wasmer Edge resources - requests, bandwidth, active
  CPU hours, provisioned memory, volume/package storage, database storage, SMTP
  emails, custom domains, build minutes, and backups - once per-plan quotas are
  exceeded. The Hobby tier is free and capped; Enterprise is custom-priced. The
  Registry GraphQL API and package publishing are included across tiers, so cost
  is driven almost entirely by Edge consumption.
notes: >-
  Per-resource overage rates are taken from the public pricing page and are
  subject to change; verify against the Wasmer pricing page and an account
  invoice during reconciliation.
sources:
- https://wasmer.io/pricing
- https://docs.wasmer.io/edge
- https://focus.finops.org/focus-specification/v1-3/
