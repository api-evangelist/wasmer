meters:
- name: requests
  description: Edge HTTP requests served, included up to plan quota then $0.20 per million (Pro).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - app
- name: bandwidth
  description: Edge egress bandwidth, included up to plan quota then $0.10 per GB (Pro).
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - app
- name: cpu_hours
  description: Active CPU hours consumed by apps, included up to plan quota then $0.05 per hour (Pro).
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - app
- name: provisioned_memory
  description: Provisioned memory in GB-hours, included up to plan quota then $0.01 per GB-hour (Pro).
  unit: gb_hours
  aggregation: sum
  dimensions:
  - account
  - app
- name: storage
  description: Volume and package storage, included up to plan quota then $0.05 per GB (Pro).
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - app
- name: database_storage
  description: Database storage, included up to plan quota then $10 per GB (Pro).
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - app
- name: build_minutes
  description: CI/build minutes, included up to plan quota then $0.002 per minute (Pro).
  unit: minutes
  aggregation: sum
  dimensions:
  - account
  - app
- name: seats
  description: Team member seats beyond the included two on Pro at $5 per seat.
  unit: seats
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track Edge consumption per app against plan quotas in the Wasmer dashboard; watch request, CPU, and bandwidth burn.
- name: Allocation
  description: Map apps and namespaces to teams/cost centers; use per-app metering dimensions to attribute Edge spend.
- name: Optimization
  description: Right-size provisioned memory and CPU, cache to cut bandwidth, prune idle apps, and stay within plan quotas before overages kick in.
- name: Accountability
  description: Assign owners per app/namespace and review monthly Edge overages and seat counts against budget.
maintainers:
