publisherName: Wasmer
serviceCategory: Compute and Edge
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Wasmer Edge
  ServiceCategory: Compute and Edge
