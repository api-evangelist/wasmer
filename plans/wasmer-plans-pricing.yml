  - label: Custom Domains
    name: custom_domains
    type: quota
    metric: domains
    limit: 50
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Build Minutes
    name: build_minutes
    type: quota
    metric: minutes
    limit: 500
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: Registry GraphQL API
  - name: Package Publishing
  - name: Wasmer Edge
  - name: 1-Day Log Retention
  - name: Community Support
- id: wasmer-pro
