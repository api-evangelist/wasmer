specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Wasmer
providerId: wasmer
created: '2026-06-20'
modified: '2026-06-20'
reconciled: false
tags:
- WebAssembly
- Wasm
- Registry
- Edge
- Runtime
- Plans
description: >-
  Wasmer offers a free-forever Hobby tier, a flat-rate Pro tier with
  usage-based overages on Wasmer Edge resources (requests, bandwidth, CPU
  hours, provisioned memory, storage, databases, domains, build minutes), and a
  custom Enterprise / Subhosting tier. The Wasmer Registry GraphQL API and
  package publishing are available across tiers; Edge consumption is what drives
  metered cost. Overage rates and quotas are taken from the public pricing page
  and are not reconciled against an account invoice in this artifact.
notes: >-
  Pricing reflects the wasmer.io/pricing page; verify current quotas, overage
  rates, and Edge usage pricing on the live page during reconciliation.
sources:
- https://wasmer.io/pricing
- https://docs.wasmer.io/edge
- https://docs.wasmer.io/registry
plans:
- id: wasmer-hobby
  name: Hobby
  type: free
  description: >-
    Free-forever tier for individual hobby projects, including registry
    publishing and a capped allotment of Wasmer Edge resources.
  entries:
  - label: Apps
    name: apps
    type: quota
    metric: apps
    limit: 3
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Requests
    name: requests
    type: quota
    metric: requests
    limit: 100000
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Bandwidth
    name: bandwidth
    type: quota
    metric: gigabytes
    limit: 150
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Active CPU Hours
    name: cpu_hours
    type: quota
    metric: hours
    limit: 50
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Provisioned Memory
    name: provisioned_memory
    type: quota
    metric: gb_hours
    limit: 500
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Volume Storage
    name: volume_storage
    type: quota
    metric: gigabytes
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Package Storage
    name: package_storage
    type: quota
    metric: gigabytes
    limit: 1
    timeFrame: month
    geo: global
